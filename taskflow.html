<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Task Organizer</title>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface-2: #f9fafc;
    --text: #1a1f2e;
    --text-muted: #6b7387;
    --border: #e3e6ee;
    --primary: #5b6cff;
    --primary-hover: #4a59e6;
    --todo: #6b7387;
    --progress: #f5a623;
    --done: #2bb673;
    --failed: #e54d4d;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --priority-low: #3aa3ff;
    --priority-med: #f5a623;
    --priority-high: #e54d4d;
  }
  [data-theme="dark"] {
    --bg: #0f1419;
    --surface: #1a1f2b;
    --surface-2: #232936;
    --text: #e8eaf0;
    --text-muted: #8a92a6;
    --border: #2c3445;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #5b6cff, #8b5fe6);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
  }
  .search-box {
    flex: 1;
    max-width: 400px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .search-box input:focus { border-color: var(--primary); }
  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    opacity: 0.5;
  }
  .header-controls {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }
  .btn {
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--surface-2); }
  .btn-primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger {
    background: var(--failed);
    color: white;
    border-color: var(--failed);
  }
  .btn-icon {
    padding: 7px 9px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-size: 14px;
  }
  .btn-icon:hover { background: var(--surface-2); color: var(--text); }
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 5px 11px;
    border-radius: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { color: var(--text); }
  .filter-chip.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 20px 24px;
    min-height: calc(100vh - 130px);
  }
  @media (max-width: 1100px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .board { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; }
    .search-box { max-width: 100%; order: 3; flex-basis: 100%; }
  }
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .column.drag-over {
    background: var(--surface-2);
    border-color: var(--primary);
    border-style: dashed;
  }
  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .column-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .column[data-status="todo"] .column-dot { background: var(--todo); }
  .column[data-status="todo"] .column-header { border-bottom-color: var(--todo); }
  .column[data-status="progress"] .column-dot { background: var(--progress); }
  .column[data-status="progress"] .column-header { border-bottom-color: var(--progress); }
  .column[data-status="done"] .column-dot { background: var(--done); }
  .column[data-status="done"] .column-header { border-bottom-color: var(--done); }
  .column[data-status="failed"] .column-dot { background: var(--failed); }
  .column[data-status="failed"] .column-header { border-bottom-color: var(--failed); }
  .column-count {
    background: var(--surface-2);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .column-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .task-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .task-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .task-card.dragging { opacity: 0.5; cursor: grabbing; }
  .task-card[data-priority="high"] { border-left: 4px solid var(--priority-high); }
  .task-card[data-priority="medium"] { border-left: 4px solid var(--priority-med); }
  .task-card[data-priority="low"] { border-left: 4px solid var(--priority-low); }
  .task-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    line-height: 1.3;
    word-break: break-word;
  }
  .task-card[data-status="done"] .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .task-card[data-status="failed"] .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
    opacity: 0.7;
  }
  .task-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.4;
    word-break: break-word;
    white-space: pre-wrap;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-top: 8px;
  }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-weight: 500;
  }
  .badge-due {
    background: rgba(245,166,35,0.12);
    color: #c47b00;
    border-color: rgba(245,166,35,0.3);
  }
  .badge-due.overdue {
    background: rgba(229,77,77,0.12);
    color: var(--failed);
    border-color: rgba(229,77,77,0.3);
  }
  [data-theme="dark"] .badge-due { color: #f5a623; }
  .task-checklist {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--done);
    transition: width 0.3s;
  }
  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    padding: 30px 10px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
  }
  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-body { padding: 20px 22px; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  input[type="text"], input[type="datetime-local"], select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); }
  textarea { resize: vertical; min-height: 70px; }
  .checklist-editor { display: flex; flex-direction: column; gap: 6px; }
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .checklist-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--primary);
  }
  .checklist-item input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    padding: 4px;
  }
  .checklist-item.done input[type="text"] {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .checklist-item .remove-item {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .checklist-item .remove-item:hover { color: var(--failed); background: var(--surface); }
  .add-checklist-btn {
    align-self: flex-start;
    background: none;
    border: 1px dashed var(--border);
    padding: 6px 12px;
    color: var(--text-muted);
    font-size: 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .add-checklist-btn:hover { border-color: var(--primary); color: var(--primary); }
  .priority-selector { display: flex; gap: 6px; }
  .priority-option {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .priority-option.selected[data-value="low"] { background: var(--priority-low); color: white; border-color: var(--priority-low); }
  .priority-option.selected[data-value="medium"] { background: var(--priority-med); color: white; border-color: var(--priority-med); }
  .priority-option.selected[data-value="high"] { background: var(--priority-high); color: white; border-color: var(--priority-high); }
  /* Notes panel */
  .panel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .note-card {
    background: #fff8c5;
    color: #4a3f00;
    padding: 14px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    position: relative;
    min-height: 110px;
    cursor: pointer;
  }
  .note-card:nth-child(4n+2) { background: #c5e8ff; color: #003a4f; }
  .note-card:nth-child(4n+3) { background: #d8ffc5; color: #1e4a00; }
  .note-card:nth-child(4n) { background: #ffd6e0; color: #4f0014; }
  .note-card .note-text {
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.4;
  }
  .note-card .note-date {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    opacity: 0.6;
  }
  .note-card .note-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.1);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .note-card:hover .note-delete { opacity: 1; }
  .note-card .note-delete:hover { background: rgba(0,0,0,0.2); }
  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 4px; }
  .stat-card[data-type="todo"] .stat-value { color: var(--todo); }
  .stat-card[data-type="progress"] .stat-value { color: var(--progress); }
  .stat-card[data-type="done"] .stat-value { color: var(--done); }
  .stat-card[data-type="failed"] .stat-value { color: var(--failed); }
  .completion-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }
  .completion-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--done), #5fd4a4);
    transition: width 0.4s;
  }
  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: var(--surface);
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 13px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  /* Task detail view */
  .detail-checklist { list-style: none; }
  .detail-checklist li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .detail-checklist li.done span { text-decoration: line-through; color: var(--text-muted); }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag-chip {
    padding: 3px 9px;
    background: rgba(91,108,255,0.12);
    color: var(--primary);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .task-tags-input {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    min-height: 38px;
  }
  .task-tags-input input {
    border: none;
    background: transparent;
    flex: 1;
    min-width: 100px;
    padding: 4px;
    outline: none;
    color: var(--text);
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--primary);
    color: white;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 11px;
  }
  .tag-pill button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    line-height: 1;
    opacity: 0.8;
  }
  .tag-pill button:hover { opacity: 1; }
  .empty-board {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }
  .empty-board h2 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
  .empty-board p { font-size: 13px; }
  .danger-zone {
    margin-top: 16px;
    padding: 12px;
    background: rgba(229,77,77,0.06);
    border: 1px solid rgba(229,77,77,0.2);
    border-radius: var(--radius-sm);
  }
  /* Attachments */
  .attachments-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
  }
  .attachment-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .attachment-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .attachment-icon.pdf { background: #e54d4d; }
  .attachment-icon.word { background: #2b6cb0; }
  .attachment-icon.excel { background: #2bb673; }
  .attachment-icon.other { background: #6b7387; }
  .attachment-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .attachment-name {
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .attachment-size {
    font-size: 11px;
    color: var(--text-muted);
  }
  .attachment-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .attachment-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .attachment-actions button:hover {
    background: var(--surface);
    color: var(--text);
  }
  .attachment-actions .remove-btn:hover { color: var(--failed); }
  .file-drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface-2);
  }
  .file-drop-zone:hover, .file-drop-zone.drag-over {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(91,108,255,0.04);
  }
  .file-drop-zone strong { color: var(--primary); }
  .attachment-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: rgba(91,108,255,0.12);
    color: var(--primary);
    border: 1px solid rgba(91,108,255,0.3);
    font-weight: 500;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✓</div>
    <span>TaskFlow</span>
  </div>
  <div class="search-box">
    <input type="search" id="searchInput" placeholder="Search tasks, tags, or notes...">
  </div>
  <div class="header-controls">

<div class="toast" id="toast"></div>

<script>
// ===== State Management =====
const STORAGE_KEY = 'taskflow_data_v1';
let state = {
  tasks: [],
  notes: [],
  filters: { priority: 'all', tag: 'all', search: '' },
  theme: 'light',
};
let editingTaskId = null;
let currentTags = [];
let currentAttachments = [];
const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5 MB per file

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.tasks = parsed.tasks || [];
      state.notes = parsed.notes || [];
      state.theme = parsed.theme || 'light';
    }
  } catch (e) { console.error('Load failed', e); }
  // Migration: any legacy task without a due date gets a default (end of today)
  let migrated = false;
  state.tasks.forEach(t => {
    if (!t.due) {
      const d = new Date();
      d.setHours(17, 0, 0, 0);
      if (d < new Date()) d.setDate(d.getDate() + 1);
      t.due = toLocalDatetime(d.toISOString());
      migrated = true;
    }
  });
  if (migrated) saveState();
  document.documentElement.setAttribute('data-theme', state.theme);
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    tasks: state.tasks,
    notes: state.notes,
    theme: state.theme,
  }));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ===== Rendering =====
function render() {
  const cols = { todo: [], progress: [], done: [], failed: [] };
  const search = state.filters.search.toLowerCase();
  state.tasks.forEach(t => {
    if (state.filters.priority !== 'all' && t.priority !== state.filters.priority) return;
    if (state.filters.tag !== 'all' && !(t.tags || []).includes(state.filters.tag)) return;
    if (search) {
      const haystack = (t.title + ' ' + (t.desc || '') + ' ' + (t.tags || []).join(' ')).toLowerCase();
      if (!haystack.includes(search)) return;
    }
    if (cols[t.status]) cols[t.status].push(t);
  });
  ['todo', 'progress', 'done', 'failed'].forEach(status => {
    const container = document.getElementById('col-' + status);
    document.getElementById('count-' + status).textContent = cols[status].length;
    container.innerHTML = '';
    if (cols[status].length === 0) {
      container.innerHTML = '<div class="empty-state">Drop tasks here</div>';
      return;
    }
    cols[status]
      .sort((a, b) => {
        const pri = { high: 0, medium: 1, low: 2 };
        const pa = pri[a.priority] ?? 1, pb = pri[b.priority] ?? 1;
        if (pa !== pb) return pa - pb;
        if (a.due && b.due) return new Date(a.due) - new Date(b.due);
        if (a.due) return -1;
        if (b.due) return 1;
        return (b.createdAt || 0) - (a.createdAt || 0);
      })
      .forEach(t => container.appendChild(renderCard(t)));
  });
  renderTagFilters();
}

function renderCard(t) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.draggable = true;
  card.dataset.id = t.id;
  card.dataset.priority = t.priority || 'medium';
  card.dataset.status = t.status;
  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('click', () => openDetailModal(t.id));

  let html = `<div class="task-title">${escapeHtml(t.title)}</div>`;
  if (t.desc) html += `<div class="task-desc">${escapeHtml(t.desc)}</div>`;

  const meta = [];
  if (t.due) {
    const due = new Date(t.due);
    const overdue = due < new Date() && t.status !== 'done';
    meta.push(`<span class="badge badge-due ${overdue ? 'overdue' : ''}">⏰ ${formatDue(t.due)}</span>`);
  }
  (t.tags || []).slice(0, 3).forEach(tag => {
    meta.push(`<span class="badge">#${escapeHtml(tag)}</span>`);
  });
  if (meta.length) html += `<div class="task-meta">${meta.join('')}</div>`;

  if (t.checklist && t.checklist.length) {
    const total = t.checklist.length;
    const done = t.checklist.filter(c => c.done).length;
    const pct = Math.round((done / total) * 100);
    html += `<div class="task-checklist">📋 ${done}/${total} bullets</div>`;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  }

  if (t.attachments && t.attachments.length) {
    html += `<div class="task-checklist">📎 ${t.attachments.length} attachment${t.attachments.length > 1 ? 's' : ''}</div>`;
  }

  card.innerHTML = html;
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function formatDue(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = d - now;
  const days = Math.round(diff / 86400000);
  const opts = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  const pretty = d.toLocaleString(undefined, opts);
  if (days === 0) return 'Today ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  if (days === 1) return 'Tomorrow';
  if (days === -1) return 'Yesterday';
  if (days < 0) return `${Math.abs(days)}d overdue`;
  if (days < 7) return `In ${days}d`;
  return pretty;
}

function renderTagFilters() {
  const tagSet = new Set();
  state.tasks.forEach(t => (t.tags || []).forEach(tag => tagSet.add(tag)));
  const wrap = document.getElementById('tagFilters');
  let html = `<div class="filter-chip ${state.filters.tag === 'all' ? 'active' : ''}" data-filter="tag" data-value="all">All</div>`;
  [...tagSet].sort().forEach(tag => {
    html += `<div class="filter-chip ${state.filters.tag === tag ? 'active' : ''}" data-filter="tag" data-value="${escapeHtml(tag)}">#${escapeHtml(tag)}</div>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.filters.tag = chip.dataset.value;
      render();
    });
  });
}

// ===== Drag & Drop =====
function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  const newStatus = e.currentTarget.dataset.status;
  if (task.status !== newStatus) {
    task.status = newStatus;
    task.updatedAt = Date.now();
    if (newStatus === 'done') task.completedAt = Date.now();
    saveState();
    render();
    showToast(`Moved to ${statusLabel(newStatus)}`);
  }
}
function statusLabel(s) {
  return { todo: 'Task', progress: 'In Progress', done: 'Done', failed: 'Failed' }[s] || s;
}

// ===== Modal: Task =====
function openTaskModal(taskId) {
  editingTaskId = taskId || null;
  currentTags = [];
  currentAttachments = [];
  const titleEl = document.getElementById('taskModalTitle');
  document.getElementById('dangerZone').style.display = taskId ? 'block' : 'none';
  if (taskId) {
    const t = state.tasks.find(x => x.id === taskId);
    titleEl.textContent = 'Edit Task';
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskDesc').value = t.desc || '';
    document.getElementById('taskStatus').value = t.status;
    document.getElementById('taskDue').value = t.due ? toLocalDatetime(t.due) : '';
    setPriority(t.priority || 'medium');
    currentTags = [...(t.tags || [])];
    currentAttachments = (t.attachments || []).map(a => ({ ...a }));
    renderChecklistEditor(t.checklist || []);
  } else {
    titleEl.textContent = 'New Task';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskStatus').value = 'todo';
    // Default due date to end of today (5 PM) so it's never empty
    const defaultDue = new Date();
    defaultDue.setHours(17, 0, 0, 0);
    if (defaultDue < new Date()) {
      defaultDue.setDate(defaultDue.getDate() + 1);
    }
    document.getElementById('taskDue').value = toLocalDatetime(defaultDue.toISOString());
    setPriority('medium');
    renderChecklistEditor([]);
  }
  renderTagsInput();
  renderAttachmentsEditor();
  document.getElementById('taskModal').classList.add('open');
  setTimeout(() => document.getElementById('taskTitle').focus(), 50);
}

// ===== Attachments =====
function getFileKind(name, type) {
  const n = (name || '').toLowerCase();
  if (n.endsWith('.pdf') || type === 'application/pdf') return { kind: 'pdf', label: 'PDF' };
  if (n.endsWith('.doc') || n.endsWith('.docx') || type.includes('word')) return { kind: 'word', label: 'DOC' };
  if (n.endsWith('.xls') || n.endsWith('.xlsx') || n.endsWith('.csv') || type.includes('excel') || type.includes('spreadsheet') || type === 'text/csv') return { kind: 'excel', label: 'XLS' };
  return { kind: 'other', label: 'FILE' };
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleFileSelect(files) {
  const allowed = ['.pdf', '.doc', '.docx', '.xls', '.xlsx', '.csv'];
  for (const file of files) {
    const lname = file.name.toLowerCase();
    const okExt = allowed.some(ext => lname.endsWith(ext));
    if (!okExt) {
      showToast(`"${file.name}" — only PDF, Word, Excel, CSV allowed`);
      continue;
    }
    if (file.size > MAX_FILE_SIZE) {
      showToast(`"${file.name}" exceeds 5 MB limit`);
      continue;
    }
    try {
      const dataUrl = await readFileAsDataURL(file);
      const { kind, label } = getFileKind(file.name, file.type);
      currentAttachments.push({
        id: uid(),
        name: file.name,
        size: file.size,
        type: file.type,
        kind, label,
        data: dataUrl,
        addedAt: Date.now(),
      });
    } catch (e) {
      showToast(`Failed to read "${file.name}"`);
    }
  }
  renderAttachmentsEditor();
}

function renderAttachmentsEditor() {
  const wrap = document.getElementById('attachmentsEditor');
  if (!currentAttachments.length) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = currentAttachments.map(a => `
    <div class="attachment-item">
      <div class="attachment-icon ${a.kind}">${a.label}</div>
      <div class="attachment-info">
        <div class="attachment-name">${escapeHtml(a.name)}</div>
        <div class="attachment-size">${formatFileSize(a.size)}</div>
      </div>
      <div class="attachment-actions">
        <button onclick="downloadAttachmentFromEditor('${a.id}')" title="Download">⬇</button>
        <button class="remove-btn" onclick="removeAttachmentFromEditor('${a.id}')" title="Remove">✕</button>
      </div>
    </div>
  `).join('');
}

function downloadAttachmentFromEditor(id) {
  const a = currentAttachments.find(x => x.id === id);
  if (a) downloadAttachment(a);
}

function removeAttachmentFromEditor(id) {
  currentAttachments = currentAttachments.filter(a => a.id !== id);
  renderAttachmentsEditor();
}

function downloadAttachment(a) {
  const link = document.createElement('a');
  link.href = a.data;
  link.download = a.name;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function downloadTaskAttachment(taskId, attId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const a = (t.attachments || []).find(x => x.id === attId);
  if (a) downloadAttachment(a);
}

function toLocalDatetime(iso) {
  const d = new Date(iso);
  const tzo = d.getTimezoneOffset() * 60000;
  return new Date(d - tzo).toISOString().slice(0, 16);
}

function setPriority(p) {
  document.querySelectorAll('#prioritySelector .priority-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.value === p);
  });
}

function createChecklistRow(item = { text: '', done: false }) {
  const row = document.createElement('div');
  row.className = 'checklist-item' + (item.done ? ' done' : '');
  row.innerHTML = `
    <input type="checkbox" ${item.done ? 'checked' : ''}>
    <input type="text" value="${escapeHtml(item.text)}" placeholder="Bullet action">
    <button class="remove-item" type="button">✕</button>
  `;
  const cb = row.querySelector('input[type="checkbox"]');
  const txt = row.querySelector('input[type="text"]');
  cb.addEventListener('change', () => row.classList.toggle('done', cb.checked));
  row.querySelector('.remove-item').addEventListener('click', () => {
    const prev = row.previousElementSibling;
    row.remove();
    // Focus previous bullet if one exists
    if (prev) {
      const prevTxt = prev.querySelector('input[type="text"]');
      if (prevTxt) prevTxt.focus();
    }
  });
  // Enter → add a new bullet below and focus it
  // Backspace on empty bullet → delete and focus previous
  txt.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const newRow = createChecklistRow();
      if (row.nextSibling) {
        row.parentNode.insertBefore(newRow, row.nextSibling);
      } else {
        row.parentNode.appendChild(newRow);
      }
      newRow.querySelector('input[type="text"]').focus();
    } else if (e.key === 'Backspace' && txt.value === '') {
      const prev = row.previousElementSibling;
      const next = row.nextElementSibling;
      if (prev || next) {
        e.preventDefault();
        row.remove();
        const focusTarget = prev || next;
        const focusInput = focusTarget.querySelector('input[type="text"]');
        if (focusInput) {
          focusInput.focus();
          // Place cursor at end
          const len = focusInput.value.length;
          focusInput.setSelectionRange(len, len);
        }
      }
    }
  });
  return row;
}

function renderChecklistEditor(items) {
  const c = document.getElementById('checklistEditor');
  c.innerHTML = '';
  items.forEach(item => c.appendChild(createChecklistRow(item)));
}

function addChecklistItem() {
  const c = document.getElementById('checklistEditor');
  const row = createChecklistRow();
  c.appendChild(row);
  row.querySelector('input[type="text"]').focus();
}

function collectChecklist() {
  return [...document.querySelectorAll('#checklistEditor .checklist-item')]
    .map(row => ({
      text: row.querySelector('input[type="text"]').value.trim(),
      done: row.querySelector('input[type="checkbox"]').checked,
    }))
    .filter(x => x.text);
}

function renderTagsInput() {
  const wrap = document.getElementById('tagsInput');
  [...wrap.querySelectorAll('.tag-pill')].forEach(p => p.remove());
  currentTags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${escapeHtml(tag)}<button type="button">✕</button>`;
    pill.querySelector('button').addEventListener('click', () => {
      currentTags.splice(i, 1);
      renderTagsInput();
    });
    wrap.insertBefore(pill, document.getElementById('tagInputField'));
  });
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { showToast('Title required'); return; }
  const due = document.getElementById('taskDue').value;
  if (!due) {
    showToast('Due date required');
    document.getElementById('taskDue').focus();
    return;
  }
  const desc = document.getElementById('taskDesc').value.trim();
  const status = document.getElementById('taskStatus').value;
  const priorityEl = document.querySelector('#prioritySelector .priority-option.selected');
  const priority = priorityEl ? priorityEl.dataset.value : 'medium';
  const checklist = collectChecklist();
  const tags = [...currentTags];

  const attachments = [...currentAttachments];

  if (editingTaskId) {
    const t = state.tasks.find(x => x.id === editingTaskId);
    Object.assign(t, { title, desc, status, due, priority, checklist, tags, attachments, updatedAt: Date.now() });
    // Reset reminder if due date changed
    t.remindedAt = null;
    if (status === 'done' && !t.completedAt) t.completedAt = Date.now();
    showToast('Task updated');
  } else {
    state.tasks.push({
      id: uid(),
      title, desc, status, due, priority, checklist, tags, attachments,
      createdAt: Date.now(), updatedAt: Date.now(),
      remindedAt: null,
    });
    showToast('Task created');
  }
  try {
    saveState();
  } catch (e) {
    showToast('Storage full — try removing large attachments');
    return;
  }
  closeModal('taskModal');
  render();
}

function deleteCurrentTask() {
  if (!editingTaskId) return;
  if (!confirm('Delete this task permanently?')) return;
  state.tasks = state.tasks.filter(t => t.id !== editingTaskId);
  saveState();
  closeModal('taskModal');
  render();
  showToast('Task deleted');
}

// ===== Detail Modal =====
function openDetailModal(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('detailTitle').textContent = t.title;
  const body = document.getElementById('detailBody');
  let html = '';
  html += `<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">`;
  html += `<span class="badge" style="background:rgba(91,108,255,0.12);color:var(--primary);border-color:rgba(91,108,255,0.3)">${statusLabel(t.status)}</span>`;
  html += `<span class="badge">Priority: ${t.priority}</span>`;
  if (t.due) html += `<span class="badge badge-due">⏰ ${formatDue(t.due)}</span>`;
  html += `</div>`;
  if (t.desc) html += `<div style="margin-bottom:14px;white-space:pre-wrap;line-height:1.5;font-size:14px">${escapeHtml(t.desc)}</div>`;
  if (t.tags && t.tags.length) {
    html += `<div class="detail-tags">${t.tags.map(tag => `<span class="tag-chip">#${escapeHtml(tag)}</span>`).join('')}</div>`;
  }
  if (t.checklist && t.checklist.length) {
    html += `<h4 style="margin-top:16px;margin-bottom:8px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px">Bullet Actions</h4>`;
    html += `<ul class="detail-checklist">`;
    t.checklist.forEach((c, i) => {
      html += `<li class="${c.done ? 'done' : ''}">
        <input type="checkbox" ${c.done ? 'checked' : ''} data-idx="${i}" onchange="toggleChecklistItem('${t.id}', ${i}, this.checked)">
        <span>${escapeHtml(c.text)}</span>
      </li>`;
    });
    html += `</ul>`;
  }
  if (t.attachments && t.attachments.length) {
    html += `<h4 style="margin-top:16px;margin-bottom:8px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px">Attachments</h4>`;
    html += `<div class="attachments-list">`;
    t.attachments.forEach(a => {
      html += `<div class="attachment-item">
        <div class="attachment-icon ${a.kind}">${a.label}</div>
        <div class="attachment-info">
          <div class="attachment-name">${escapeHtml(a.name)}</div>
          <div class="attachment-size">${formatFileSize(a.size)}</div>
        </div>
        <div class="attachment-actions">
          <button onclick="downloadTaskAttachment('${t.id}', '${a.id}')" title="Download">⬇ Download</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<div style="margin-top:16px;font-size:11px;color:var(--text-muted)">`;
  if (t.createdAt) html += `Created ${new Date(t.createdAt).toLocaleString()}<br>`;
  if (t.updatedAt) html += `Updated ${new Date(t.updatedAt).toLocaleString()}`;
  html += `</div>`;
  body.innerHTML = html;
  document.getElementById('detailEditBtn').onclick = () => {
    closeModal('detailModal');
    openTaskModal(id);
  };
  document.getElementById('detailModal').classList.add('open');
}

function toggleChecklistItem(taskId, idx, checked) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || !t.checklist[idx]) return;
  t.checklist[idx].done = checked;
  t.updatedAt = Date.now();
  saveState();
  render();
}

// ===== Notes =====
function openNotesModal() {
  renderNotes();
  document.getElementById('notesModal').classList.add('open');
}

function addNote() {
  const text = document.getElementById('newNoteText').value.trim();
  if (!text) return;
  state.notes.unshift({ id: uid(), text, createdAt: Date.now() });
  document.getElementById('newNoteText').value = '';
  saveState();
  renderNotes();
}

function deleteNote(id) {
  state.notes = state.notes.filter(n => n.id !== id);
  saveState();
  renderNotes();
}

function renderNotes() {
  const grid = document.getElementById('notesGrid');
  if (!state.notes.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:30px">No notes yet. Jot something down above!</div>';
    return;
  }
  grid.innerHTML = state.notes.map(n => `
    <div class="note-card">
      <button class="note-delete" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
      <div class="note-text">${escapeHtml(n.text)}</div>
      <div class="note-date">${new Date(n.createdAt).toLocaleDateString()}</div>
    </div>
  `).join('');
}

// ===== Stats =====
function openStatsModal() {
  const counts = { todo: 0, progress: 0, done: 0, failed: 0 };
  state.tasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
  const total = state.tasks.length;
  const completionRate = total ? Math.round((counts.done / total) * 100) : 0;
  const overdue = state.tasks.filter(t => t.due && new Date(t.due) < new Date() && t.status !== 'done' && t.status !== 'failed').length;
  const dueSoon = state.tasks.filter(t => {
    if (!t.due || t.status === 'done' || t.status === 'failed') return false;
    const diff = new Date(t.due) - new Date();
    return diff > 0 && diff < 86400000 * 2;
  }).length;

  // Tag breakdown
  const tagCounts = {};
  state.tasks.forEach(t => (t.tags || []).forEach(tag => tagCounts[tag] = (tagCounts[tag] || 0) + 1));
  const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

  document.getElementById('statsBody').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" data-type="todo"><div class="stat-value">${counts.todo}</div><div class="stat-label">Task</div></div>
      <div class="stat-card" data-type="progress"><div class="stat-value">${counts.progress}</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card" data-type="done"><div class="stat-value">${counts.done}</div><div class="stat-label">Done</div></div>
      <div class="stat-card" data-type="failed"><div class="stat-value">${counts.failed}</div><div class="stat-label">Failed</div></div>
    </div>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
        <span><strong>Completion Rate</strong></span>
        <span>${completionRate}% (${counts.done}/${total})</span>
      </div>
      <div class="completion-bar"><div class="completion-fill" style="width:${completionRate}%"></div></div>
    </div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat-card"><div class="stat-value" style="color:var(--failed)">${overdue}</div><div class="stat-label">Overdue</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--progress)">${dueSoon}</div><div class="stat-label">Due in 48h</div></div>
    </div>
    ${topTags.length ? `
      <h4 style="margin-top:18px;margin-bottom:10px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px">Top Tags</h4>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${topTags.map(([tag, count]) => {
          const pct = Math.round((count / total) * 100);
          return `<div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
              <span>#${escapeHtml(tag)}</span><span>${count}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--primary)"></div></div>
          </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;
  document.getElementById('statsModal').classList.add('open');
}

// ===== Reminders =====
function checkReminders() {
  const now = Date.now();
  state.tasks.forEach(t => {
    if (!t.due) return;
    if (t.status === 'done' || t.status === 'failed') return;
    const dueTime = new Date(t.due).getTime();
    if (dueTime <= now && !t.remindedAt) {
      notifyReminder(t);
      t.remindedAt = now;
      saveState();
    }
  });
}

function notifyReminder(t) {
  const msg = `⏰ ${t.title} is due!`;
  showToast(msg);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('TaskFlow Reminder', { body: t.title, icon: '' });
  }
}

function requestNotifications() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ===== Theme =====
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
}

// ===== Import/Export =====
function exportData() {
  const data = JSON.stringify({ tasks: state.tasks, notes: state.notes, exportedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `taskflow-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!confirm(`Import ${data.tasks?.length || 0} tasks and ${data.notes?.length || 0} notes? This will replace current data.`)) return;
      state.tasks = data.tasks || [];
      state.notes = data.notes || [];
      saveState();
      render();
      showToast('Data imported');
    } catch (err) {
      showToast('Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== Modal Helpers =====
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.classList.remove('open');
  });
});

// ===== Toast =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== Filters / Search =====
document.querySelectorAll('.filter-bar .filter-chip[data-filter="priority"]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-bar .filter-chip[data-filter="priority"]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.filters.priority = chip.dataset.value;
    render();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  state.filters.search = e.target.value;
  render();
});

// ===== Priority Selector =====
document.querySelectorAll('#prioritySelector .priority-option').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('#prioritySelector .priority-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  });
});

// ===== Tag Input =====
document.getElementById('tagInputField').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/[#,]/g, '');
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderTagsInput();
    }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
    currentTags.pop();
    renderTagsInput();
  }
});

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    openTaskModal();
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(m => m.classList.remove('open'));
  }
});

// ===== File Input Wiring =====
document.getElementById('fileAttachInput').addEventListener('change', e => {
  if (e.target.files && e.target.files.length) {
    handleFileSelect(e.target.files);
  }
  e.target.value = '';
});
const dropZone = document.getElementById('fileDropZone');
['dragenter', 'dragover'].forEach(evt => {
  dropZone.addEventListener(evt, e => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(evt => {
  dropZone.addEventListener(evt, e => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('drag-over');
  });
});
dropZone.addEventListener('drop', e => {
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    handleFileSelect(e.dataTransfer.files);
  }
});

// ===== Init =====
loadState();
render();
requestNotifications();
checkReminders();
setInterval(checkReminders, 30000);

// Sample data on first run
if (state.tasks.length === 0 && state.notes.length === 0) {
  const today5pm = new Date(); today5pm.setHours(17, 0, 0, 0);
  const tomorrow = new Date(Date.now() + 86400000);
  const inThreeDays = new Date(Date.now() + 86400000 * 3);
  const yesterday = new Date(Date.now() - 86400000);
  state.tasks = [
    {
      id: uid(), title: 'Welcome to TaskFlow!', desc: 'Click any card to view details. Drag cards between columns to update status.',
      status: 'todo', priority: 'high', tags: ['getting-started'], due: toLocalDatetime(today5pm.toISOString()),
      checklist: [
        { text: 'Click "+ New Task" to create your first task', done: false },
        { text: 'Try drag-and-drop between columns', done: false },
        { text: 'Add a quick note in the Notes section', done: false },
      ],
      createdAt: Date.now(), updatedAt: Date.now(),
    },
    {
      id: uid(), title: 'Review weekly goals', desc: 'Check progress on Q2 milestones and update timeline.',
      status: 'progress', priority: 'medium', tags: ['planning'], due: toLocalDatetime(tomorrow.toISOString()),
      checklist: [
        { text: 'Review last week\'s outcomes', done: true },
        { text: 'Set this week\'s priorities', done: false },
      ],
      createdAt: Date.now(), updatedAt: Date.now(),
    },
    {
      id: uid(), title: 'Set up workspace', desc: 'Initial setup tasks completed.', status: 'done',
      priority: 'low', tags: ['setup'], due: toLocalDatetime(yesterday.toISOString()), checklist: [],
      createdAt: Date.now() - 86400000, updatedAt: Date.now(), completedAt: Date.now(),
    },
  ];
  state.notes = [
    { id: uid(), text: 'Tip: Use Ctrl+K to search quickly, Ctrl+N for a new task.', createdAt: Date.now() },
    { id: uid(), text: 'Reminder: Backup your data weekly using the export button.', createdAt: Date.now() },
  ];
  saveState();
  render();
}
</script>
